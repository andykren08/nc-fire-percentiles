name: Generate NBM Probabilistic Maps

on:
  schedule:
    # Runs at 03:00, 09:00, 15:00, and 21:00 UTC
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch: # Keeps the manual run button!

# Permissions required to deploy directly to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple runs from tripping over each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libeccodes0 libeccodes-dev libgeos-dev libproj-dev proj-data proj-bin

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy xarray netCDF4 requests matplotlib cartopy metpy ecmwflibs eccodes cfgrib Pillow

    - name: Run NBM Percentile Script
      # We will name our new python file this:
      run: python nbm_fire_danger.py

    - name: Disable Jekyll
      run: touch .nojekyll

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
